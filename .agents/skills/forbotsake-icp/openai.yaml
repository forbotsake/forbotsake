name: forbotsake-icp
description: >-
  Stage 4: RESEARCH (audience). Builds a deep audience profile by combining your
  strategy.md

  ICP with real web research on communities, content preferences, and daily
  workflows.

  Produces icp-profile.md with a persona narrative, daily journey map, pain
  points,

  communities, and content preferences.

  Use when: "who is my audience", "audience research", "ICP deep dive",
  "persona",

  "where does my user hang out", "community research", "understand my customer",

  "audience profile", "buyer persona".

  Proactively invoke when the user wants to understand their audience better or

  is unsure where to find their target users online.
