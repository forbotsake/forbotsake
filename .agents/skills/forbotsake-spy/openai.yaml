name: forbotsake-spy
description: >-
  Stage 3: RESEARCH (competitors). Analyzes 3-5 competitors to find messaging
  whitespace

  and positioning gaps. Produces competitor-analysis.md with a messaging matrix
  showing

  what each competitor says, what's missing, and where you can win.

  Use when: "competitor analysis", "competitive research", "what are others
  doing",

  "market landscape", "who am I competing with", "spy on competitors",

  "messaging whitespace", "differentiation research".

  Proactively invoke when the user mentions competitors or asks how to
  differentiate.
