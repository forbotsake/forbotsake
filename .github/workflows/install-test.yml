name: Install Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up fake Claude Code skills directory
        run: mkdir -p ~/.claude/skills

      - name: Copy repo to skills directory (simulates git clone)
        run: |
          mkdir -p ~/.claude/skills/forbotsake
          rsync -a --exclude='.claude' --exclude='.git' . ~/.claude/skills/forbotsake/

      - name: Make scripts executable
        run: chmod +x ~/.claude/skills/forbotsake/bin/*.sh

      - name: Run sync-links
        run: bash ~/.claude/skills/forbotsake/bin/sync-links.sh

      - name: Verify all skills are symlinked
        run: |
          EXPECTED=$(ls -d ~/.claude/skills/forbotsake/forbotsake-*/ 2>/dev/null | wc -l | tr -d ' ')
          FOUND=0
          for skill_dir in ~/.claude/skills/forbotsake/forbotsake-*/; do
            [ -d "$skill_dir" ] || continue
            skill_name=$(basename "$skill_dir")
            if [ -L ~/.claude/skills/"$skill_name"/SKILL.md ]; then
              FOUND=$((FOUND + 1))
            else
              echo "FAIL: $skill_name symlink not found"
            fi
          done
          echo "Found $FOUND / $EXPECTED symlinks"
          if [ "$FOUND" -ne "$EXPECTED" ]; then
            echo "FAIL: expected $EXPECTED symlinks, found $FOUND"
            exit 1
          fi

      - name: Verify doctor mode
        run: bash ~/.claude/skills/forbotsake/bin/sync-links.sh --check

      - name: Test uninstall
        run: bash ~/.claude/skills/forbotsake/bin/uninstall.sh --force

      - name: Verify symlinks removed
        run: |
          for skill_dir in ~/.claude/skills/forbotsake/forbotsake-*/; do
            [ -d "$skill_dir" ] || continue
            skill_name=$(basename "$skill_dir")
            if [ -L ~/.claude/skills/"$skill_name"/SKILL.md ]; then
              echo "FAIL: $skill_name symlink still exists after uninstall"
              exit 1
            fi
          done
          echo "All symlinks removed"

      - name: Test fresh install via install.sh
        env:
          GITHUB_WORKSPACE_PATH: ${{ github.workspace }}
        run: |
          mkdir -p ~/.claude/skills/forbotsake
          rsync -a --exclude='.claude' --exclude='.git' "$GITHUB_WORKSPACE_PATH/" ~/.claude/skills/forbotsake/
          chmod +x ~/.claude/skills/forbotsake/bin/*.sh
          bash ~/.claude/skills/forbotsake/bin/install.sh
          bash ~/.claude/skills/forbotsake/bin/sync-links.sh --check
